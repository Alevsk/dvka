---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubelet-explorer-sa
  namespace: default
---
# Grant list permission on nodes so the pod can discover node IPs via the API
# nodes/proxy subresource is required to reach the Kubelet HTTPS API (port 10250) via the service account token
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubelet-explorer-role
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - nodes/proxy
      - nodes/metrics
      - nodes/log
      - nodes/stats
    verbs:
      - get
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubelet-explorer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubelet-explorer-role
subjects:
  - kind: ServiceAccount
    name: kubelet-explorer-sa
    namespace: default
---
apiVersion: v1
kind: Pod
metadata:
  name: kubelet-explorer
  namespace: default
  labels:
    app: kubelet-explorer
spec:
  serviceAccountName: kubelet-explorer-sa
  containers:
    - name: attacker
      image: alpine:3.19
      command:
        - sleep
        - "3600"
      imagePullPolicy: IfNotPresent
      env:
        # Inject the node's IP address via the downward API
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
  restartPolicy: Always
