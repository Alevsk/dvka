---
# Pod used to flood the API server with requests or to exhaust namespace quota.
# Deploy many replicas of this lightweight pod to fill the namespace quota.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-exhauster
  namespace: dos-lab
  labels:
    app: quota-exhauster
    scenario: quota-exhaustion
spec:
  # Start with 1 replica, then scale up: kubectl scale deploy quota-exhauster --replicas=20 -n dos-lab
  replicas: 1
  selector:
    matchLabels:
      app: quota-exhauster
  template:
    metadata:
      labels:
        app: quota-exhauster
    spec:
      containers:
        - name: idle
          image: busybox:1.36
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
