---
# A stateful application with a PVC to demonstrate data destruction techniques.
apiVersion: v1
kind: Namespace
metadata:
  name: stateful-app
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data-pvc
  namespace: stateful-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  namespace: stateful-app
  labels:
    app: database
spec:
  serviceName: database
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: db
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              # Install openssl for the Ransomware Simulation section
              apk add --no-cache openssl > /dev/null 2>&1
              # Seed the volume with simulated database files
              mkdir -p /data/db
              echo "CRITICAL_RECORD_001: production data" > /data/db/records.dat
              echo "CRITICAL_RECORD_002: financial transactions" >> /data/db/records.dat
              echo "BACKUP_2024-01-01: full snapshot" > /data/db/backup.dat
              echo "Database initialized with $(wc -l < /data/db/records.dat) records."
              while true; do sleep 3600; done
          volumeMounts:
            - name: app-data
              mountPath: /data
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: stateful-app
spec:
  clusterIP: None
  selector:
    app: database
  ports:
    - port: 5432
      targetPort: 5432
---
# A second deployment to demonstrate namespace-level destruction
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: stateful-app
  labels:
    app: backend-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: stateful-app
data:
  db_host: "database.stateful-app.svc.cluster.local"
  db_port: "5432"
  environment: "production"
