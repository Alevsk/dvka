---
# A pod that references the private registry imagePullSecret.
# This simulates a workload whose image is pulled from the private registry.
# The imagePullSecret contains registry credentials that an attacker can extract.
apiVersion: v1
kind: Pod
metadata:
  name: app-from-registry
  namespace: default
  labels:
    app: app-from-registry
spec:
  imagePullSecrets:
    - name: registry-credentials
  containers:
    - name: app
      # nginx is used as a stand-in for a "proprietary" image stored in the private registry.
      # In the lab we re-tag and push nginx to the local registry under this reference.
      image: private-registry:5000/internal/webapp:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 80
      env:
        - name: DB_PASSWORD
          value: "super-secret-db-password-123"
        - name: API_KEY
          value: "sk-prod-api-key-do-not-share"
