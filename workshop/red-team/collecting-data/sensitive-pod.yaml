---
# A pod that simulates a workload holding sensitive data:
#   - Credentials baked into environment variables
#   - A secret file written to a shared volume
#   - A mounted Kubernetes service-account token
apiVersion: v1
kind: Namespace
metadata:
  name: prod-app
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: prod-app
type: Opaque
stringData:
  username: "admin"
  password: "P@ssw0rd!SuperSecret"
  connection-string: "postgresql://admin:P@ssw0rd!SuperSecret@db.internal:5432/proddb"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: prod-app
data:
  config.yaml: |
    server:
      host: 0.0.0.0
      port: 8080
    database:
      host: db.internal
      port: 5432
    payments:
      stripe_key: sk_live_51ABCDEFghijklmnopqrstuvwx
      webhook_secret: whsec_abcdefghijklmnopqrstuvwxyz
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensitive-app
  namespace: prod-app
  labels:
    app: sensitive-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensitive-app
  template:
    metadata:
      labels:
        app: sensitive-app
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Write sensitive files to the data volume
              echo "BEGIN RSA PRIVATE KEY" > /data/id_rsa
              echo "MIIEowIBAAKCAQEA2a2rwplBQLzHPZe5TNJT4GQWU4rAGAhbaODdRCIuNHhKzBAs" >> /data/id_rsa
              echo "END RSA PRIVATE KEY" >> /data/id_rsa
              echo "prod-token-abc123xyz789" > /data/auth_token.txt
              echo "customer_id,email,credit_card" > /data/customers.csv
              echo "1001,alice@example.com,4111111111111111" >> /data/customers.csv
              echo "1002,bob@example.com,5500005555555559" >> /data/customers.csv
              # Keep the container running
              while true; do sleep 3600; done
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: AWS_ACCESS_KEY_ID
              value: "AKIAIOSFODNN7EXAMPLE"
            - name: AWS_SECRET_ACCESS_KEY
              value: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
            - name: APP_ENV
              value: "production"
          volumeMounts:
            - name: data-volume
              mountPath: /data
            - name: config-volume
              mountPath: /etc/app
      volumes:
        - name: data-volume
          emptyDir: {}
        - name: config-volume
          configMap:
            name: app-config
