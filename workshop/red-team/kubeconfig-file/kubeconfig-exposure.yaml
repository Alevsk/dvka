---
apiVersion: v1
kind: Namespace
metadata:
  name: kubeconfig-lab
---
# Simulate a kubeconfig stored as a Secret (a common real-world mistake —
# operators often store kubeconfigs as Secrets to pass them between CI jobs
# or to provide access to auxiliary clusters).
apiVersion: v1
kind: Secret
metadata:
  name: admin-kubeconfig
  namespace: kubeconfig-lab
type: Opaque
stringData:
  config: |
    apiVersion: v1
    kind: Config
    clusters:
    - cluster:
        server: https://kubernetes.default.svc.cluster.local
        insecure-skip-tls-verify: true
      name: workshop-cluster
    contexts:
    - context:
        cluster: workshop-cluster
        user: admin
      name: workshop-context
    current-context: workshop-context
    users:
    - name: admin
      user:
        token: REPLACE_WITH_REAL_TOKEN_FOR_FULL_DEMO
---
# Grant the default service account read access so the stolen kubeconfig
# can be used to demonstrate real cluster enumeration.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeconfig-lab-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: default
    namespace: kubeconfig-lab
---
# A pod that mounts the kubeconfig secret — simulating a CI runner,
# a GitOps agent, or a developer tooling pod that needs cluster access.
apiVersion: v1
kind: Pod
metadata:
  name: ci-runner
  namespace: kubeconfig-lab
  labels:
    app: ci-runner
spec:
  serviceAccountName: default
  containers:
    - name: runner
      image: alpine:latest
      command: ["/bin/sh", "-c", "apk add --no-cache curl > /dev/null 2>&1 && sleep 3600"]
      volumeMounts:
        - name: kubeconfig-volume
          mountPath: /root/.kube
          readOnly: false
      env:
        - name: KUBECONFIG
          value: /root/.kube/config
  volumes:
    - name: kubeconfig-volume
      secret:
        secretName: admin-kubeconfig
        items:
          - key: config
            path: config
