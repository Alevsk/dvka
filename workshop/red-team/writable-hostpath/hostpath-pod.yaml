apiVersion: v1
kind: Pod
metadata:
  name: hostpath-writer
  namespace: default
  labels:
    app: hostpath-writer
spec:
  containers:
    - name: writer
      image: alpine:latest
      command: ["/bin/sh", "-c", "sleep infinity"]
      securityContext:
        privileged: true
        runAsUser: 0
      volumeMounts:
        - name: host-root
          mountPath: /host
        - name: host-etc
          mountPath: /host-etc
        - name: host-tmp
          mountPath: /host-tmp
  volumes:
    - name: host-root
      hostPath:
        path: /
    - name: host-etc
      hostPath:
        path: /etc
    - name: host-tmp
      hostPath:
        path: /tmp
