apiVersion: v1
kind: Pod
metadata:
  name: pivot-pod
  namespace: default
  labels:
    app: pivot-pod
spec:
  containers:
    - name: pivot
      image: alpine:latest
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          apk add --no-cache curl netcat-openbsd > /dev/null 2>&1
          # Start a minimal HTTP server to simulate an internal service endpoint
          while true; do
            printf "HTTP/1.1 200 OK\r\nContent-Type: text/html\r\nContent-Length: 61\r\nConnection: close\r\n\r\n<html><body><h1>pivot-pod internal service</h1></body></html>" \
              | nc -l -p 8080 2>/dev/null || true
          done
      ports:
        - containerPort: 8080
  restartPolicy: Never
