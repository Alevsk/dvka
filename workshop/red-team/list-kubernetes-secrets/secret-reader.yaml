---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-reader-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-reader-role
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secret-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secret-reader-role
subjects:
  - kind: ServiceAccount
    name: secret-reader-sa
    namespace: default
---
apiVersion: v1
kind: Pod
metadata:
  name: secret-reader
  namespace: default
  labels:
    app: secret-reader
spec:
  serviceAccountName: secret-reader-sa
  containers:
    - name: attacker
      image: alpine:latest
      command:
        - /bin/sh
        - -c
        - apk add --no-cache curl > /dev/null 2>&1 && sleep 3600
      imagePullPolicy: IfNotPresent
  restartPolicy: Always
